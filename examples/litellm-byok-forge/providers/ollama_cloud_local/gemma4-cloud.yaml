# Ollama Cloud (local signed-in) — gemma4:cloud
# Source: doggy8088/byok-forge / litellm.html
# Source commit: 6b1d5012cbe0391817a79387894db2493de3b047
# API keys are loaded at runtime from environment variables.
# Provider model source: https://ollama.com/search?c=cloud (retrieved 2026-07-12)

model_list:
  - model_name: "ollama_cloud_local__gemma4-cloud"
    litellm_params:
      model: "ollama_chat/gemma4:cloud"
      api_base: "http://localhost:11434"

litellm_settings:
  drop_params: true

general_settings:
  master_key: os.environ/LITELLM_MASTER_KEY
