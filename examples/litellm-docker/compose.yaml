services:
  litellm:
    image: ${LITELLM_IMAGE:-docker.litellm.ai/berriai/litellm:main-latest}
    command: ["--config", "/app/config.yaml", "--port", "4000"]
    env_file:
      - .env
    ports:
      - "127.0.0.1:${LITELLM_PORT:-4000}:4000"
    volumes:
      - ./config.yaml:/app/config.yaml:ro
    restart: unless-stopped
